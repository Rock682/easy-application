    <script>
    const PAGES = [
        { title: 'SSC CGL 2026', url: '../jobs/ssc-cgl-2026/', cat: 'Central Govt', kw: 'ssc cgl graduate level staff selection' },
        { title: 'SSC CHSL 2026', url: '../jobs/ssc-chsl-2026/', cat: 'Central Govt', kw: 'ssc chsl ldc deo higher secondary' },
        { title: 'RRB NTPC 2026', url: '../jobs/rrb-ntpc-2026/', cat: 'Central Govt', kw: 'rrb ntpc railway non technical' },
        { title: 'RRB Group D 2026', url: '../jobs/rrb-group-d-2026/', cat: 'Central Govt', kw: 'rrb group d railway level 1' },
        { title: 'UPSC Civil Services 2026', url: '../jobs/upsc-civil-services/', cat: 'Central Govt', kw: 'upsc ias ips civil services' },
        { title: 'IBPS PO 2026', url: '../jobs/ibps-po-2026/', cat: 'Central Govt', kw: 'ibps po bank probationary officer' },
        { title: 'APPSC Group 1 2026', url: '../jobs/appsc-group-1-2026/', cat: 'AP State', kw: 'appsc group 1 andhra pradesh deputy collector' },
        { title: 'AP Police Constable', url: '../jobs/ap-police-constable/', cat: 'AP State', kw: 'ap police constable slprb' },
        { title: 'AP DSC 2026', url: '../jobs/ap-dsc-2026/', cat: 'AP State', kw: 'ap dsc teacher school assistant' },
        { title: 'AP Grama Sachivalayam', url: '../jobs/ap-grama-sachivalayam/', cat: 'AP State', kw: 'grama sachivalayam village ward secretariat' },
        { title: 'AP EAPCET 2026', url: '../ap-eapcet-2026/', cat: 'Entrance Exam', kw: 'eapcet engineering agriculture pharmacy ap' },
        { title: 'AP ICET 2026', url: '../ap-icet-2026/', cat: 'Entrance Exam', kw: 'icet mba mca ap' },
        { title: 'AP ECET 2026', url: '../ap-ecet-2026/', cat: 'Entrance Exam', kw: 'ecet diploma engineering lateral' },
        { title: 'AP POLYCET 2026', url: '../ap-polycet-2026/', cat: 'Entrance Exam', kw: 'polycet polytechnic diploma' },
        { title: 'AP LAWCET 2026', url: '../ap-lawcet-2026/', cat: 'Entrance Exam', kw: 'lawcet law llb ap' },
        { title: 'AP EdCET 2026', url: '../ap-edcet-2026/', cat: 'Entrance Exam', kw: 'edcet bed education' },
        { title: 'AP PECET 2026', url: '../ap-pecet-2026/', cat: 'Entrance Exam', kw: 'pecet physical education bped' },
        { title: 'AP PGECET 2026', url: '../ap-pgecet-2026/', cat: 'Entrance Exam', kw: 'pgecet mtech mpharm pg engineering' },
        { title: 'AP PGCET 2026', url: '../ap-pgcet-2026/', cat: 'Entrance Exam', kw: 'pgcet ma msc mcom pg' },
        { title: 'APSET 2026', url: '../apset-2026/', cat: 'Entrance Exam', kw: 'apset assistant professor eligibility' },
    ];

    function doSearch(e) {
        e.preventDefault();
        const q = document.getElementById('q').value.trim().toLowerCase();
        const results = document.getElementById('results');
        if (!q) { results.innerHTML = '<li class="no-results">Enter a job or exam name to search.</li>'; return false; }
        const matches = PAGES.filter(p => (p.title + ' ' + p.kw + ' ' + p.cat).toLowerCase().includes(q));
        if (!matches.length) {
            results.innerHTML = '<li class="no-results">No results for "<strong>' + q + '</strong>". Try SSC, RRB, EAPCET, or APPSC.</li>';
        } else {
            results.innerHTML = matches.map(p => '<li><a href="' + p.url + '">' + p.title + '</a><div class="meta">' + p.cat + '</div></li>').join('');
        }
        history.replaceState(null, '', '?q=' + encodeURIComponent(q));
        return false;
    }

    const params = new URLSearchParams(location.search);
    if (params.get('q')) {
        document.getElementById('q').value = params.get('q');
        doSearch(new Event('submit'));
    }
    </script>
